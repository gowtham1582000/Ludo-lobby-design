<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ludo Board</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
    * { box-sizing:border-box; margin:0; padding:0; }
    html { background:#050e1f; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    body {
      background:radial-gradient(ellipse at center,#0f3460 0%,#0a1628 70%);
      display:flex; align-items:center; justify-content:center;
      width:390px; height:844px;
    }
    #clip {
      width:390px; height:844px; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      background:radial-gradient(ellipse at center,#0f3460 0%,#0a1628 70%);
    }
    #board { position:relative; transform:rotate(90deg) scale(0.513); transform-origin:center center; flex-shrink:0; }

    /* Token animations */
    @keyframes floatA { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-4px) scale(1.06)} }
    @keyframes floatB { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-4px) scale(1.06)} }
    @keyframes pulse  { 0%,100%{box-shadow:var(--ts)} 50%{box-shadow:var(--tp)} }

    .tok-wrap {
      position:absolute; cursor:pointer; z-index:25;
      animation: floatA 2s ease-in-out infinite;
    }
    .tok-wrap:nth-child(2) { animation-name:floatB; animation-delay:0.5s; }
    .tok-wrap:nth-child(3) { animation-delay:1s; }
    .tok-wrap:nth-child(4) { animation-delay:1.5s; }
    .tok-wrap:hover .tok-coin {
      transform: scale(1.35) translateY(-5px);
      filter: brightness(1.45) drop-shadow(0 0 8px var(--tg));
    }
    .tok-wrap:active .tok-coin { transform: scale(0.85); }
    .tok-coin {
      width:100%; height:100%; border-radius:50%;
      transition: transform 0.18s ease, filter 0.18s ease;
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    /* shine overlay inside coin */
    .tok-coin::before {
      content:''; position:absolute;
      top:10%; left:15%; width:38%; height:32%;
      background:radial-gradient(ellipse,rgba(255,255,255,0.7) 0%,rgba(255,255,255,0) 100%);
      border-radius:50%; pointer-events:none;
    }
    /* bottom shadow inside coin */
    .tok-coin::after {
      content:''; position:absolute;
      bottom:8%; right:12%; width:32%; height:26%;
      background:radial-gradient(ellipse,rgba(0,0,0,0.35) 0%,rgba(0,0,0,0) 100%);
      border-radius:50%; pointer-events:none;
    }
  </style>
</head>
<body>
<div id="clip"><div id="board"></div></div>
<script>
const BL   = 36;
const GAP  = 4;
const S    = BL + GAP;   // 40
const CW   = 1645;
const CH   = 760;
const COLS = 25;
const ROWS = 13;
const RL   = 325;
const RT   = 122;

const cx = c => RL + c * S;
const ry = r => RT + r * S;

const CC_TOP = 12;   // 13th block — P1/P2 connector
const CC_BOT = 12;   // 13th block — P3/P4 connector
const CX_TOP = cx(CC_TOP);
const CX_BOT = cx(CC_BOT);
const UC_TOP = 11;   // 12th block — top U-connector
const UC_BOT = 13;   // 14th block — bottom U-connector
const UX_TOP = cx(UC_TOP);
const UX_BOT = cx(UC_BOT);

// Keep CC as alias for top (used in T-arm loops)
const CC = CC_TOP;
const CX = CX_TOP;

const ARM_N     = 7;
const ARM_TOP_Y = 2;
const ARM_BOT_Y = 722;

const stemTopYs = [42, 82];
const stemBotYs = [642, 682];

const HOME_D    = 70;
const P1_HOME_X = cx(CC_TOP - ARM_N) - S - HOME_D;
const P2_HOME_X = cx(CC_TOP + ARM_N) + S;
const P3_HOME_X = cx(CC_BOT - ARM_N) - S - HOME_D;
const P4_HOME_X = cx(CC_BOT + ARM_N) + S;
const HOME_TOP_Y = Math.max(0, ARM_TOP_Y + BL/2 - HOME_D/2);
const HOME_BOT_Y = Math.min(CH - HOME_D, ARM_BOT_Y + BL/2 - HOME_D/2);

// Top U-connector: 3 each side of UC_TOP (col11)
const U_L_TOP = UC_TOP - 3;   // col8
const U_R_TOP = UC_TOP + 3;   // col14
const ULX_TOP = cx(U_L_TOP);
const URX_TOP = cx(U_R_TOP);

// Bottom U-connector: 3 each side of UC_BOT (col13)
const U_L_BOT = UC_BOT - 3;   // col10
const U_R_BOT = UC_BOT + 3;   // col16
const ULX_BOT = cx(U_L_BOT);
const URX_BOT = cx(U_R_BOT);

const TOP_ENTRY_Y = ry(0);
const TOP_HBAR_Y  = ry(1);
const TOP_LEGS_Y  = ry(2);
const BOT_EXIT_Y  = ry(12);
const BOT_HBAR_Y  = ry(11);
const BOT_LEGS_Y  = ry(10);

// Barrel spans exactly from bottom of top legs to top of bottom legs
const BARREL_TOP  = TOP_LEGS_Y + BL;   // flush no gap
const BARREL_BOT  = BOT_LEGS_Y;        // flush
const BARREL_SPAN = BARREL_BOT - BARREL_TOP;

// Barrel spans exactly flush between top legs bottom and bottom legs top
const BARREL_AVAIL = BOT_LEGS_Y - (TOP_LEGS_Y + BL);  // available space
const HALF_GAP  = 8;
const HALF_H    = Math.floor((BARREL_AVAIL - HALF_GAP) / 2);  // fill all available space
const BARREL_TOTAL_H = HALF_H * 2 + HALF_GAP;
// Flush: top barrel starts right at bottom of top legs
const BARREL_T1 = TOP_LEGS_Y + BL;
const BARREL_T2 = BARREL_T1 + HALF_H + HALF_GAP;

// Both barrels at same X position (aligned with U-connectors)
const TOP_BARREL_LEFT = ULX_TOP;
const TOP_BARREL_W    = URX_TOP + BL - ULX_TOP;
const BOT_BARREL_LEFT = ULX_BOT;
const BOT_BARREL_W    = URX_BOT + BL - ULX_BOT;

/* ════ DOM ════ */
const board = document.getElementById('board');
board.style.cssText = `width:${CW}px;height:${CH}px;position:relative;`;

function mkEl(x, y, w, h, css) {
  const d = document.createElement('div');
  d.style.cssText = `position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;border-radius:6px;${css}`;
  board.appendChild(d); return d;
}

const CREAM  = 'background:linear-gradient(145deg,#f5e6c8,#e8d5a8);border:2.5px solid #c4a96a;box-shadow:inset 0 2px 0 rgba(255,255,255,0.7),0 2px 5px rgba(0,0,0,0.22);z-index:3;';
const SILVER = 'background:linear-gradient(145deg,#eaeaea,#ababab);border:2.5px solid #999;box-shadow:inset 0 2px 0 rgba(255,255,255,0.9),0 2px 5px rgba(0,0,0,0.3);z-index:6;';
const PINK   = 'background:linear-gradient(145deg,#ff6eb0,#e0206e);border:2.5px solid #a0005a;box-shadow:0 0 8px #e0206e66;z-index:3;';
const AP1    = 'background:linear-gradient(145deg,#ff7070,#e63946);border:2.5px solid #a01020;box-shadow:0 0 7px #e6394666;z-index:3;';
const AP2    = 'background:linear-gradient(145deg,#60e880,#2dc653);border:2.5px solid #1a7a30;box-shadow:0 0 7px #2dc65366;z-index:3;';
const AP3    = 'background:linear-gradient(145deg,#ffe570,#f4c430);border:2.5px solid #c89010;box-shadow:0 0 7px #f4c43066;z-index:3;';
const AP4    = 'background:linear-gradient(145deg,#70b0ff,#3a86ff);border:2.5px solid #1050b8;box-shadow:0 0 7px #3a86ff66;z-index:3;';

const blk  = (x,y) => mkEl(x,y,BL,BL,CREAM);
const slv  = (x,y) => mkEl(x,y,BL,BL,SILVER);
const safe = (x,y) => mkEl(x,y,BL,BL,PINK);
const ap1  = (x,y) => mkEl(x,y,BL,BL,AP1);
const ap2  = (x,y) => mkEl(x,y,BL,BL,AP2);
const ap3  = (x,y) => mkEl(x,y,BL,BL,AP3);
const ap4  = (x,y) => mkEl(x,y,BL,BL,AP4);

function arrowSVG(x, y, dir) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', `0 0 ${BL} ${BL}`);
  svg.style.cssText = `position:absolute;left:${x}px;top:${y}px;width:${BL}px;height:${BL}px;z-index:14;pointer-events:none;`;
  const poly = document.createElementNS(ns, 'polygon');
  const m=BL/2, p=8, e=BL-8;
  const pts = { r:`${p},${p} ${e},${m} ${p},${e}`, l:`${e},${p} ${p},${m} ${e},${e}`, d:`${p},${p} ${e},${p} ${m},${e}`, u:`${p},${e} ${e},${e} ${m},${p}` }[dir];
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', 'rgba(0,0,0,0.82)');
  poly.setAttribute('stroke', 'rgba(255,255,255,0.35)');
  poly.setAttribute('stroke-width', '1');
  poly.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(poly); board.appendChild(svg);
}

// ── Home circle: plain coloured ring, tokens placed inside by placeTokensInHome ──
function homeCircle(bg, sh, x, y) {
  const d = document.createElement('div');
  d.style.cssText = `
    position:absolute;left:${x}px;top:${y}px;
    width:${HOME_D}px;height:${HOME_D}px;border-radius:50%;
    background:${bg};
    box-shadow:${sh},inset 0 4px 8px rgba(255,255,255,0.2),inset 0 -4px 10px rgba(0,0,0,0.45);
    border:4px solid rgba(255,255,255,0.72);z-index:9;`;
  board.appendChild(d);
}

// ── Player label shown clearly BESIDE the home circle ──
function homeLabel(lbl, color, shadow, x, y) {
  const d = document.createElement('div');
  // For top players (y near top) → label below; for bottom players → label above
  const labelY = y < CH/2 ? y + HOME_D + 4 : y - 30;
  d.style.cssText = `
    position:absolute;
    left:${x}px;top:${labelY}px;
    width:${HOME_D}px;
    font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;
    color:${color};text-align:center;letter-spacing:2px;
    text-shadow:${shadow};
    z-index:30;pointer-events:none;`;
  d.textContent = lbl;
  board.appendChild(d);
}

// ── Barrel: two coloured halves with recessed token slots ──
// Fixed compact size — centered in the available span, NOT stretched
function barrel(bLeft, bW, bTop, bH, glow, bg1, bg2) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    position:absolute;left:${bLeft}px;top:${bTop}px;width:${bW}px;height:${bH}px;
    border-radius:12px;overflow:hidden;display:flex;flex-direction:row;
    border:3px solid rgba(0,0,0,0.5);z-index:5;
    ${glow
      ? 'box-shadow:0 0 22px 8px rgba(255,215,0,0.6),0 0 44px 14px rgba(255,215,0,0.18);'
      : 'box-shadow:inset 0 2px 4px rgba(255,255,255,0.08),0 4px 14px rgba(0,0,0,0.6);'}`;

  const makeHalf = (bg, borderRight) => {
    const half = document.createElement('div');
    half.style.cssText = `flex:1;background:${bg};display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:10px;align-items:center;justify-items:center;
      ${borderRight ? 'border-right:2px solid rgba(0,0,0,0.35);' : ''}`;
    for (let i = 0; i < 4; i++) {
      const slot = document.createElement('div');
      slot.style.cssText = `
        width:26px;height:26px;border-radius:50%;flex-shrink:0;
        background:radial-gradient(circle at 38% 34%, rgba(255,255,255,0.07) 0%, rgba(0,0,0,0.78) 68%);
        box-shadow:inset 0 3px 8px rgba(0,0,0,0.9),inset 0 1px 4px rgba(0,0,0,0.6);
        border:1.5px solid rgba(0,0,0,0.65);`;
      half.appendChild(slot);
    }
    return half;
  };

  wrap.appendChild(makeHalf(bg1, true));
  wrap.appendChild(makeHalf(bg2, false));
  board.appendChild(wrap);
}

/* ─────────────────── 1. Inner blue bg ─────────────────── */
{
  const d = document.createElement('div');
  d.style.cssText = `position:absolute;
    left:${cx(1)}px;top:${ry(1)}px;
    width:${cx(COLS-2)+BL-cx(1)}px;height:${ry(ROWS-2)+BL-ry(1)}px;
    background:#1e3278;border-radius:5px;z-index:1;`;
  board.appendChild(d);
}

/* ─────────────────── 2. Outer rectangle ─────────────────── */
const pinkSet = new Set([
  '0-6','0-14',
  '12-10','12-18',
  '4-0','11-0',
  '1-24','8-24'
]);
const arrMap  = {
  '0-3':'r','0-4':'r','0-20':'r','0-21':'r',
  '12-3':'l','12-4':'l','12-20':'l','12-21':'l',
  '2-0':'u','3-0':'u','9-0':'u','10-0':'u',
  '2-24':'d','3-24':'d','9-24':'d','10-24':'d',
};
for (let r=0; r<ROWS; r++) {
  for (let c=0; c<COLS; c++) {
    const onBorder = r===0||r===ROWS-1||c===0||c===COLS-1;
    if (!onBorder) continue;
    if (r===0      && c===CC_TOP) { blk(cx(c),ry(r)); continue; }
    if (r===ROWS-1 && c===CC_BOT) { blk(cx(c),ry(r)); continue; }
    const key = `${r}-${c}`;
    pinkSet.has(key) ? safe(cx(c),ry(r)) : blk(cx(c),ry(r));
    if (arrMap[key]) arrowSVG(cx(c),ry(r),arrMap[key]);
  }
}

/* ─────────────────── 3. Top T-arm ─────────────────── */
homeCircle('radial-gradient(circle,#ff6060,#e63946,#a01020)','0 0 20px #e6394699', P1_HOME_X, HOME_TOP_Y);
homeLabel('P1','#fff','0 0 12px rgba(255,80,80,1), 0 2px 8px rgba(0,0,0,1)', P1_HOME_X, HOME_TOP_Y);
for (let i=ARM_N; i>=1; i--) (i===ARM_N ? safe(cx(CC-i), ARM_TOP_Y) : ap1(cx(CC-i), ARM_TOP_Y));
slv(CX, ARM_TOP_Y);
for (let i=1; i<=ARM_N; i++) (i===ARM_N ? safe(cx(CC+i), ARM_TOP_Y) : ap2(cx(CC+i), ARM_TOP_Y));
homeCircle('radial-gradient(circle,#60e880,#2dc653,#1a7a30)','0 0 20px #2dc65399', P2_HOME_X, HOME_TOP_Y);
homeLabel('P2','#fff','0 0 12px rgba(45,198,83,1), 0 2px 8px rgba(0,0,0,1)', P2_HOME_X, HOME_TOP_Y);

/* ─────────────────── 4. Top stem ─────────────────── */
stemTopYs.forEach((y, index) => (index === 1 ? safe(CX, y) : slv(CX, y)));
arrowSVG(CX, stemTopYs[0], 'd');

/* ─────────────────── 5. U-connector top ─────────────────── */
slv(UX_TOP, TOP_ENTRY_Y);
for (let c=U_L_TOP; c<=U_R_TOP; c++) slv(cx(c), TOP_HBAR_Y);
slv(ULX_TOP, TOP_HBAR_Y);
slv(URX_TOP, TOP_HBAR_Y);
slv(ULX_TOP, TOP_LEGS_Y);
slv(URX_TOP, TOP_LEGS_Y);

/* ─────────────────── 6. Barrels — FULL HEIGHT flush with legs ─────────────────── */
// Top barrel (P1 red | P2 green) — from bottom of top legs to midpoint
barrel(TOP_BARREL_LEFT, TOP_BARREL_W, BARREL_T1, HALF_H, false,
  'linear-gradient(160deg,#c01020,#e63946)',
  'linear-gradient(160deg,#1a7a30,#2dc653)');

barrel(BOT_BARREL_LEFT, BOT_BARREL_W, BARREL_T2, HALF_H, true,
  'linear-gradient(160deg,#c89010,#f4c430)',
  'linear-gradient(160deg,#1050b8,#3a86ff)');

/* ─────────────────── 7. U-connector bottom ─────────────────── */
for (let c=U_L_BOT; c<=U_R_BOT; c++) slv(cx(c), BOT_HBAR_Y);
slv(ULX_BOT, BOT_HBAR_Y);
slv(URX_BOT, BOT_HBAR_Y);
slv(ULX_BOT, BOT_LEGS_Y);
slv(URX_BOT, BOT_LEGS_Y);
slv(UX_BOT, BOT_EXIT_Y);

/* ─────────────────── 8. Bottom stem ─────────────────── */
  
stemBotYs.forEach((y, index) => (index === 0 ? safe(CX_BOT, y) : slv(CX_BOT, y)));
arrowSVG(CX_BOT, stemBotYs[stemBotYs.length-1], 'u');

/* ─────────────────── 9. Bottom T-arm ─────────────────── */
homeCircle('radial-gradient(circle,#ffe570,#f4c430,#c89010)','0 0 20px #f4c43099', P3_HOME_X, HOME_BOT_Y);
homeLabel('P3','#ffe04a','0 0 12px rgba(244,196,48,1), 0 2px 8px rgba(0,0,0,1)', P3_HOME_X, HOME_BOT_Y);
for (let i=ARM_N; i>=1; i--) (i===ARM_N ? safe(cx(CC_BOT-i), ARM_BOT_Y) : ap3(cx(CC_BOT-i), ARM_BOT_Y));
slv(CX_BOT, ARM_BOT_Y);
for (let i=1; i<=ARM_N; i++) (i===ARM_N ? safe(cx(CC_BOT+i), ARM_BOT_Y) : ap4(cx(CC_BOT+i), ARM_BOT_Y));
homeCircle('radial-gradient(circle,#70b0ff,#3a86ff,#1050b8)','0 0 20px #3a86ff99', P4_HOME_X, HOME_BOT_Y);
homeLabel('P4','#fff','0 0 12px rgba(58,134,255,1), 0 2px 8px rgba(0,0,0,1)', P4_HOME_X, HOME_BOT_Y);

/* ─────────────────── 10. Interactive tokens inside home circles ─────────────────── */
// TOKEN diameter = 22px so 2×2 grid (22*2 + gap*1 = 50px) fits inside HOME_D=70 inner area ~62px
const TD = 22;   // token diameter
const TG = 6;    // gap between tokens

const TCOLORS = {
  p1: { outer:'#7a0c18', inner:'#e63946', shine:'rgba(255,190,190,0.8)', glow:'255,57,70' },
  p2: { outer:'#0d4a1e', inner:'#2dc653', shine:'rgba(180,255,195,0.8)', glow:'45,198,83' },
  p3: { outer:'#5a3a00', inner:'#f4c430', shine:'rgba(255,245,170,0.8)', glow:'244,196,48' },
  p4: { outer:'#071e60', inner:'#3a86ff', shine:'rgba(160,205,255,0.8)', glow:'58,134,255' },
};

function makeToken(px, py, tc, idx) {
  // Wrapper div handles animation + hover
  const wrap = document.createElement('div');
  wrap.className = 'tok-wrap';
  wrap.style.cssText = `left:${px}px;top:${py}px;width:${TD}px;height:${TD}px;animation-delay:${idx*0.45}s;`;
  wrap.style.setProperty('--tg', `rgba(${tc.glow},0.8)`);

  // Coin div: outer rim → coloured face → shine via ::before
  const coin = document.createElement('div');
  coin.className = 'tok-coin';
  coin.style.cssText = `
    background:
      radial-gradient(circle at 35% 30%, ${tc.shine} 0%, ${tc.inner} 35%, ${tc.outer} 100%);
    box-shadow:
      0 0 8px 3px rgba(${tc.glow},0.55),
      0 3px 8px rgba(0,0,0,0.75),
      inset 0 -3px 6px rgba(0,0,0,0.4),
      inset 0 2px 4px rgba(255,255,255,0.25);
    border: 2.5px solid ${tc.outer};`;

  // Inner engraved ring via SVG overlay
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 22 22');
  svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
  const ring = document.createElementNS(ns,'circle');
  ring.setAttribute('cx','11'); ring.setAttribute('cy','11'); ring.setAttribute('r','6');
  ring.setAttribute('fill','none'); ring.setAttribute('stroke','rgba(0,0,0,0.3)'); ring.setAttribute('stroke-width','1.5');
  svg.appendChild(ring);
  coin.appendChild(svg);

  wrap.appendChild(coin);
  board.appendChild(wrap);
}

function placeTokensInHome(homeX, homeY, tc) {
  // Inner usable area (minus border 4px each side) = 70-8=62px
  // Grid = 2*TD + TG = 50px, center offset = (62-50)/2 = 6px
  const offset = 4 + Math.round((HOME_D - 8 - (2*TD + TG)) / 2);
  let i = 0;
  for (let row=0; row<2; row++) {
    for (let col=0; col<2; col++) {
      makeToken(homeX + offset + col*(TD+TG), homeY + offset + row*(TD+TG), tc, i++);
    }
  }
}

placeTokensInHome(P1_HOME_X, HOME_TOP_Y, TCOLORS.p1);
placeTokensInHome(P2_HOME_X, HOME_TOP_Y, TCOLORS.p2);
placeTokensInHome(P3_HOME_X, HOME_BOT_Y, TCOLORS.p3);
placeTokensInHome(P4_HOME_X, HOME_BOT_Y, TCOLORS.p4);
</script>
  <script src="js/global-nav.js"></script></body>
</html>
