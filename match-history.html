<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Daya Pass Arena - Match History</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="match-history.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="bg-system" aria-hidden="true">
      <div class="bg-gradient"></div>
      <div class="bg-grid"></div>
      <div class="bg-scan"></div>
    </div>

    <main class="sheet" aria-label="Match history">
      <header class="topbar">
        <a class="back-btn" href="index.html" aria-label="Back to home">&larr;</a>
        <div>
          <div class="eyebrow">PERFORMANCE</div>
          <div class="title">MATCH HISTORY</div>
          <div class="sub">Breakdown of your last 10 matches.</div>
        </div>
      </header>

      <section class="hero-card">
        <div class="hero-chip">Recent Form</div>
        <div class="hero-value" id="historyWinRate">83%</div>
        <div class="hero-meta" id="historySummary">8 wins in the last 10 matches</div>
      </section>

      <section class="stats-grid">
        <article class="mini-stat">
          <div class="mini-label">Wins</div>
          <div class="mini-value" id="historyWins">41</div>
        </article>
        <article class="mini-stat">
          <div class="mini-label">Losses</div>
          <div class="mini-value" id="historyLosses">9</div>
        </article>
      </section>

      <section class="list-card">
        <div class="section-label">Last 10 Matches</div>
        <div class="match-list" id="matchHistoryList"></div>
      </section>
    </main>
  </div>

  <script src="stats-data.js"></script>
  <script src="match-history.js"></script>
</body>
</html>
