<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Daya Pass Arena - Tournament</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --green:#00e5a0; --blue:#3b82f6; --gold:#ffb800; --text:#e8f0ff; --soft:rgba(232,240,255,.72); --muted:rgba(232,240,255,.42); --border:rgba(255,255,255,.09); --border2:rgba(255,255,255,.14); --fast:.15s ease; --med:.25s ease; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; min-height:100vh; background:#04060c; color:var(--text); font-family:'Rajdhani',sans-serif; display:flex; justify-content:center; }
    .phone { position:relative; width:390px; height:690px; overflow:hidden; background:linear-gradient(180deg, rgba(6,9,18,.96), rgba(10,15,24,.98)); box-shadow:0 0 0 1px rgba(255,184,0,.08), 0 40px 120px rgba(0,0,0,.9); }
    .bg { position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at 20% 12%, rgba(255,184,0,.16), transparent 24%), radial-gradient(circle at 82% 20%, rgba(59,130,246,.14), transparent 24%), linear-gradient(145deg, #111325 0%, #0d1726 40%, #060b14 100%); }
    .shell { position:relative; z-index:1; height:690px; overflow-y:auto; padding:0 14px 104px; scrollbar-width:none; }
    .shell::-webkit-scrollbar { display:none; }
    .hdr,.hdr-side,.hdr-copy,.section-title,.row { display:flex; align-items:center; gap:10px; }
    .hdr { position:sticky; top:0; z-index:5; justify-content:space-between; margin:0 -14px; padding:14px; background:linear-gradient(180deg, rgba(8,12,20,.96), rgba(8,12,20,.72)); border-bottom:1px solid rgba(255,255,255,.05); backdrop-filter:blur(12px); }
    .hdr-copy { flex-direction:column; align-items:flex-start; gap:2px; }
    .eyebrow { font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--muted); }
    .hdr-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:1.3px; line-height:.9; }
    .icon-btn,.mini-btn,.panel-btn,.stage,.nav-btn { border:1px solid var(--border2); background:rgba(255,255,255,.05); color:var(--text); font:inherit; cursor:pointer; transition:transform var(--fast), border-color var(--fast), box-shadow var(--fast), background var(--fast); }
    .icon-btn:hover,.mini-btn:hover,.panel-btn:hover,.stage:hover,.nav-btn:hover,.panel:hover { transform:translateY(-2px); border-color:rgba(255,184,0,.32); box-shadow:0 12px 28px rgba(255,184,0,.12); }
    .icon-btn { width:40px; height:40px; border-radius:14px; display:grid; place-items:center; }
    .mini-btn,.panel-btn { border-radius:999px; font-weight:700; }
    .mini-btn { height:38px; padding:0 14px; color:var(--gold); }
    .panel-btn { height:42px; padding:0 18px; color:var(--gold); }
    .ico { width:16px; height:16px; position:relative; display:inline-block; color:currentColor; }
    .ico::before,.ico::after { content:""; position:absolute; }
    .ico.back::before { width:10px; height:10px; border-left:2px solid currentColor; border-bottom:2px solid currentColor; transform:rotate(45deg); left:4px; top:3px; }
    .section { margin-top:14px; }
    .panel { border:1px solid var(--border); border-radius:24px; padding:14px; background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)), rgba(13,18,32,.9); transition:transform var(--fast), border-color var(--fast), box-shadow var(--fast); }
    .hero h2 { font-family:'Bebas Neue',sans-serif; font-size:32px; line-height:.9; letter-spacing:1.2px; }
    .hero p { margin-top:6px; color:var(--soft); font-size:13px; line-height:1.3; }
    .prize { margin-top:14px; display:flex; align-items:center; justify-content:space-between; gap:10px; border:1px solid rgba(255,184,0,.18); border-radius:18px; padding:12px; background:rgba(255,184,0,.08); }
    .prize strong { font-family:'Orbitron',sans-serif; font-size:20px; }
    .section-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .section-title { font-family:'Orbitron',sans-serif; font-size:13px; letter-spacing:.9px; text-transform:uppercase; color:var(--soft); }
    .stage-list { display:grid; gap:10px; }
    .stage { border-radius:20px; padding:14px; text-align:left; }
    .row { justify-content:space-between; }
    .stage strong { display:block; font-size:18px; margin-top:8px; }
    .stage span { display:block; margin-top:5px; color:var(--muted); font-size:12px; line-height:1.2; }
    .badge { min-width:72px; height:30px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--soft); border:1px solid rgba(255,255,255,.1); }
    .footer-nav { position:absolute; left:0; right:0; bottom:0; z-index:8; display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:10px 12px 12px; background:linear-gradient(180deg, rgba(8,12,20,.2), rgba(8,12,20,.96)); border-top:1px solid rgba(255,255,255,.06); backdrop-filter:blur(12px); }
    .nav-btn { min-height:56px; border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .nav-btn.act { color:var(--gold); border-color:rgba(255,184,0,.3); background:linear-gradient(180deg, rgba(255,184,0,.12), rgba(255,255,255,.03)); }
    .toast { position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(24px); min-width:180px; max-width:280px; padding:10px 14px; border-radius:14px; background:rgba(7,10,18,.92); border:1px solid rgba(255,255,255,.08); font-size:13px; text-align:center; opacity:0; pointer-events:none; transition:opacity var(--med), transform var(--med); z-index:20; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="shell">
      <div class="hdr">
        <div class="hdr-side"><button class="icon-btn" onclick="window.location.href='index.html'"><span class="ico back"></span></button><div class="hdr-copy"><div class="eyebrow">Season Event</div><div class="hdr-title">Tournament</div></div></div>
        <button class="mini-btn" onclick="showToast('Bracket refreshed.')">Refresh</button>
      </div>
      <div class="section">
        <div class="panel hero">
          <h2>Crown Rush Championship</h2>
          <p>Climb through qualifiers, hold your bracket, and cash out the season’s biggest coin pool.</p>
          <div class="prize">
            <div><div class="eyebrow">Prize Pool</div><strong>50,000</strong></div>
            <button class="panel-btn" onclick="showToast('Tournament registration locked in.')">Join Now</button>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="panel">
          <div class="section-head"><div class="section-title">Tournament Stages</div><button class="mini-btn" onclick="showToast('You are viewing live stage info.')">Live</button></div>
          <div class="stage-list">
            <button class="stage" onclick="showToast('Qualifier details opened.')"><div class="row"><div class="eyebrow">Stage 1</div><div class="badge">Open</div></div><strong>Qualifier Rooms</strong><span>Fast admission, 4-player tables, and top finishers pushed into the knockout bracket.</span></button>
            <button class="stage" onclick="showToast('Knockout details opened.')"><div class="row"><div class="eyebrow">Stage 2</div><div class="badge">Soon</div></div><strong>Knockout Ladder</strong><span>Single-loss bracket with cleaner lobbies and heavier trophy pressure.</span></button>
            <button class="stage" onclick="showToast('Finals details opened.')"><div class="row"><div class="eyebrow">Stage 3</div><div class="badge">Final</div></div><strong>Grand Finals</strong><span>Top table showcase with the biggest payout slice and season prestige banner.</span></button>
          </div>
        </div>
      </div>
    </div>
    <div class="footer-nav">
      <button class="nav-btn" onclick="window.location.href='index.html'">Home</button>
      <button class="nav-btn act">Tournament</button>
      <button class="nav-btn" onclick="window.location.href='daily-reward.html'">Rewards</button>
      <button class="nav-btn" onclick="window.location.href='lucky-spin.html'">Spin</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    let toastTimer = null;
    const toast = document.getElementById('toast');
    function showToast(message){ toast.textContent = message; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 1800); }
  </script>
</body>
</html>
