<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Daya Pass Arena - Lucky Spin</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/lucky-spin.css" />
</head>

<body>
  <div class="phone">
    <div class="bg"></div>

    <div class="shell">
      <div class="hdr">
        <div class="hdr-side">
          <button class="icon-btn" onclick="window.location.href='index.html'"><span class="ico back"></span></button>
          <div class="hdr-copy">
            <div class="eyebrow">Bonus Drop</div>
            <div class="hdr-title">Lucky Spin</div>
          </div>
        </div>
        <div class="hdr-coins" id="coinDisplay"><span>🪙</span>24,650</div>
      </div>

      <div class="free-badge" id="freeBadge">
        <div class="free-dot"></div>
        1 FREE SPIN TODAY
      </div>

      <div class="wheel-scene">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>

        <div class="wheel-3d">
          <div class="wheel-pointer">
            <svg width="30" height="36" viewBox="0 0 30 36" aria-hidden="true">
              <defs>
                <linearGradient id="ptrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#FF6B35" />
                  <stop offset="100%" stop-color="#FF0000" />
                </linearGradient>
              </defs>
              <polygon points="15,36 0,0 30,0" fill="url(#ptrGrad)" stroke="#FF4136" stroke-width="1.5" />
              <circle cx="15" cy="6" r="4" fill="#FFD700" />
            </svg>
          </div>

          <div id="wheelCanvas"></div>
          <div class="wheel-hub">🎰</div>
        </div>
      </div>

      <div class="spin-btn-wrap">
        <button class="spin-btn" id="spinBtn">SPIN!</button>
        <div class="spin-cost">
          No tickets?
          <b>🪙 480</b>
          per spin
        </div>
      </div>

      <div class="tickets-bar">
        <div class="tickets-bar-left">
          <div class="tickets-bar-icon">🎟️</div>
          <div>
            <div class="tickets-bar-label">SPIN TICKETS</div>
            <div class="tickets-bar-count" id="ticketStatus">1 FREE TODAY</div>
          </div>
        </div>
        <button class="tickets-bar-btn" id="getMoreBtn">GET MORE</button>
      </div>

      <div class="rewards-section">
        <div class="rewards-label">Possible Rewards</div>
        <div class="rewards-grid" id="rewardGrid"></div>
      </div>

      <div class="rewards-section" style="margin-top: 14px;">
        <div class="rewards-label">Recent Spins</div>
        <div class="history-strip" id="historyStrip">
          <div style="color: var(--text-dim); font-size: 12px; padding: 8px 0; width: 100%; text-align: center;">
            No spins yet - hit SPIN!
          </div>
        </div>
      </div>
    </div>

    <div class="footer-nav">
      <button class="nav-btn" onclick="window.location.href='index.html'">Home</button>
      <button class="nav-btn" onclick="window.location.href='tournament.html'">Tournament</button>
      <button class="nav-btn" onclick="window.location.href='daily-reward.html'">Rewards</button>
      <button class="nav-btn act">Spin</button>
    </div>
  </div>

  <div class="modal-overlay" id="winModal">
    <div class="modal-box">
      <span class="modal-emoji" id="modalEmoji">🎉</span>
      <div class="modal-title">YOU WON!</div>
      <div class="modal-sub" id="modalRarity">LEGENDARY</div>
      <div class="modal-prize" id="modalPrize">Diamond Pack x5</div>
      <button class="modal-claim" id="claimBtn">CLAIM REWARD</button>
    </div>
  </div>

  <script src="js/lucky-spin.js"></script>
  <script src="js/global-nav.js"></script>
</body>

</html>
